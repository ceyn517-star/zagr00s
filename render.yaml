services:
  - type: web
    name: zargos-discord-search
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ZAGROS_PASSWORD
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
